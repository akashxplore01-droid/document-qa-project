<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocQA AI Pro</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 10px;
}

.upload-box {
    display: flex;
    gap: 10px;
}

#chat {
    height: 400px;
    overflow-y: auto;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

.message {
    margin: 10px 0;
    padding: 10px;
    border-radius: 8px;
}

.user {
    background: #1e293b;
    text-align: right;
}

.bot {
    background: #022c22;
}

input, button {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

button {
    background: #22c55e;
    cursor: pointer;
}

.controls {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #94a3b8;
    font-size: 14px;
}
</style>
</head>

<body>

<header>📄 DocQA AI Pro System</header>

<div class="container">

<div class="upload-box">
<input type="file" id="pdfFile" accept=".pdf">
<button onclick="loadPDF()">Upload</button>
<button onclick="clearChat()">Clear Chat</button>
</div>

<div id="chat"></div>

<div class="controls">
<input type="text" id="question" placeholder="Ask something...">
<button onclick="askQuestion()">Ask</button>
</div>

<div class="footer">
👨‍💻 Team:<br>
Omkar Ganesh Dahibhate | Akash Arun Sanap | Aniket Rajesh Gaikwad
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

let fullText = "";
let chatHistory = [];

// 🔑 ADD YOUR GEMINI API KEY
const API_KEY = "AIzaSyCCKTAGWfUPjayR4ntR3B3dwJihCXhOSL8";

async function loadPDF() {
    const file = document.getElementById("pdfFile").files[0];
    if (!file) return alert("Upload PDF first");

    const reader = new FileReader();

    reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;

        fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(item => item.str).join(" ");
            fullText += text + " ";
        }

        addMessage("PDF loaded successfully!", "bot");
    };

    reader.readAsArrayBuffer(file);
}

async function askQuestion() {
    const q = document.getElementById("question").value;
    if (!fullText) return alert("Upload PDF first");

    addMessage(q, "user");
    addMessage("Thinking...", "bot");

    const answer = await getAIAnswer(q);

    removeThinking();
    addMessage(answer, "bot");

    chatHistory.push({q, answer});
    document.getElementById("question").value = "";
}

async function getAIAnswer(question) {

    const prompt = `
You are a smart AI DocQA system.

Document:
${fullText.substring(0, 12000)}

Previous chat:
${JSON.stringify(chatHistory)}

Answer the question clearly:
${question}
`;

    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
        {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        }
    );

    const data = await response.json();

    try {
        return data.candidates[0].content.parts[0].text;
    } catch {
        return "Error generating answer.";
    }
}

function addMessage(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
    const chat = document.getElementById("chat");
    const msgs = chat.getElementsByClassName("bot");
    if (msgs.length > 0 && msgs[msgs.length - 1].innerText.includes("Thinking")) {
        msgs[msgs.length - 1].remove();
    }
}

function clearChat() {
    document.getElementById("chat").innerHTML = "";
    chatHistory = [];
}

</script>

</body>
</html>
