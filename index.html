<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocQA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 90%;
    max-width: 700px;
    margin-top: 40px;
}

h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
}

.upload {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

#chat {
    height: 400px;
    background: #020617;
    border-radius: 10px;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    padding: 8px;
    margin: 8px 0;
    border-radius: 6px;
}

.user {
    background: #1e293b;
    text-align: right;
}

.bot {
    background: #022c22;
}

.input {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 5px;
    border: none;
    background: #22c55e;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>📄 DocQA</h1>

<div class="upload">
<input type="file" id="file">
<button onclick="loadPDF()">Upload</button>
<button onclick="summarize()">Summary</button>
<button onclick="keyPoints()">Key Points</button>
</div>

<div id="chat"></div>

<div class="input">
<input type="text" id="q" placeholder="Ask anything...">
<button onclick="ask()">Ask</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

let text = "";

// 🔑 PUT YOUR KEY HERE
const API_KEY = "PASTE_OPENROUTER_KEY";

async function loadPDF() {
    const file = document.getElementById("file").files[0];
    const reader = new FileReader();

    reader.onload = async function () {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

        text = "";

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(i => i.str).join(" ") + " ";
        }

        add("PDF loaded", "bot");
    };

    reader.readAsArrayBuffer(file);
}

async function ask() {
    const q = document.getElementById("q").value;
    add(q, "user");

    const res = await ai(text + "\nQuestion: " + q);
    add(res, "bot");
}

async function summarize() {
    const res = await ai("Summarize:\n" + text);
    add(res, "bot");
}

async function keyPoints() {
    const res = await ai("Give key points:\n" + text);
    add(res, "bot");
}

async function ai(prompt) {

    const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            model: "mistralai/mistral-7b-instruct",
            messages: [{ role: "user", content: prompt }]
        })
    });

    const data = await r.json();

    return data.choices?.[0]?.message?.content || "Error generating answer";
}

function add(msg, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = msg;
    document.getElementById("chat").appendChild(div);
}

</script>

</body>
</html>
